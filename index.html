<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>리빙룸</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div id="app">
      <header id="topbar" data-tauri-drag-region>
        <button id="btn-sidebar-toggle" class="winbtn" title="사이드바 접기/펼치기">≡</button>
        <span class="topbar__title" data-tauri-drag-region>거실</span>
        <div class="topbar__spacer" data-tauri-drag-region></div>
        <button id="btn-overlay" class="btn btn--ghost" title="바탕화면 오버레이로 (Ctrl+Alt+L)">🖼 오버레이로</button>
        <label class="topbar__theme">
          배경
          <select id="theme-select">
            <option value="warm">따뜻한 낮</option>
            <option value="night">고요한 밤</option>
          </select>
        </label>
        <span id="save-status" class="save-status" data-state="saved">저장됨 ●</span>
        <div class="win-controls">
          <button id="btn-min" class="winbtn" title="최소화">─</button>
          <button id="btn-close" class="winbtn winbtn--close" title="트레이로 닫기">✕</button>
        </div>
      </header>

      <div id="body">
        <aside id="sidebar">
          <div id="sidebar-grip" class="sidebar-grip" title="드래그해서 이동">⠿ 도구막대</div>
          <button id="btn-add" class="btn btn--primary">＋ 이미지</button>
          <div class="sidebar__group">
            <button id="btn-edit" class="btn" data-needs-selection disabled>편집</button>
            <button id="btn-front" class="btn" data-needs-selection disabled>앞으로</button>
            <button id="btn-back" class="btn" data-needs-selection disabled>뒤로</button>
            <button id="btn-lock" class="btn" data-needs-selection disabled>잠금</button>
            <button id="btn-delete" class="btn btn--danger" data-needs-selection disabled>삭제</button>
          </div>

          <div class="sidebar__overlay-controls" id="overlay-controls">
            <button id="btn-to-display" class="btn" title="전시 모드 (Ctrl+Alt+E)">👁 전시 모드</button>
            <button id="btn-exit-overlay" class="btn" title="일반 창으로 (Ctrl+Alt+L)">🗗 창으로</button>
          </div>

          <div class="sidebar__footer">
            <label class="toggle">
              <input type="checkbox" id="autostart-toggle" />
              <span>부팅 시 자동 실행</span>
            </label>
            <button id="btn-update" class="btn btn--ghost">업데이트 확인</button>
          </div>
        </aside>

        <main id="canvas-wrap">
          <div id="stage"></div>
          <div id="empty-hint" class="empty-hint">
            이미지를 끌어다 놓아 거실을 꾸며보세요
          </div>

          <!-- 편집 패널 (단계 5) -->
          <section id="edit-panel" class="edit-panel" hidden>
            <header class="edit-panel__head">
              <strong>편집</strong>
              <button id="edit-close" class="iconbtn" title="닫기">✕</button>
            </header>

            <div class="edit-panel__body" id="edit-filters">
              <label class="slider">
                <span>밝기</span>
                <input type="range" id="f-brightness" min="-1" max="1" step="0.02" value="0" />
              </label>
              <label class="slider">
                <span>채도</span>
                <input type="range" id="f-saturation" min="-1" max="1" step="0.02" value="0" />
              </label>
              <label class="slider">
                <span>색조</span>
                <input type="range" id="f-hue" min="0" max="360" step="1" value="0" />
              </label>
              <label class="slider">
                <span>대비</span>
                <input type="range" id="f-contrast" min="-1" max="1" step="0.02" value="0" />
              </label>
            </div>

            <footer class="edit-panel__foot">
              <button id="btn-crop" class="btn">크롭</button>
              <button id="btn-reset" class="btn">원래대로</button>
            </footer>

            <!-- 크롭 모드 컨트롤 -->
            <div id="crop-controls" class="crop-controls" hidden>
              <span class="crop-controls__hint">자를 영역을 조절하세요</span>
              <button id="crop-apply" class="btn btn--primary">적용</button>
              <button id="crop-cancel" class="btn">취소</button>
            </div>
          </section>
        </main>
      </div>
    </div>

    <input
      type="file"
      id="file-input"
      accept="image/png,image/jpeg,image/webp"
      multiple
      hidden
    />
  </body>
</html>
