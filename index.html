<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>리빙룸</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div id="app">
      <header id="topbar" data-tauri-drag-region>
        <button id="btn-sidebar-toggle" class="winbtn" title="사이드바 접기/펼치기">≡</button>
        <span class="topbar__title" data-tauri-drag-region>거실</span>
        <div class="topbar__spacer" data-tauri-drag-region></div>
        <button id="btn-overlay" class="btn btn--ghost" title="바탕화면 오버레이로 (Ctrl+Alt+L)">🖼 오버레이로</button>
        <label class="topbar__theme">
          배경
          <select id="theme-select">
            <option value="warm">따뜻한 낮</option>
            <option value="night">고요한 밤</option>
          </select>
        </label>
        <span id="save-status" class="save-status" data-state="saved">저장됨 ●</span>
        <div class="win-controls">
          <button id="btn-min" class="winbtn" title="최소화">─</button>
          <button id="btn-close" class="winbtn winbtn--close" title="트레이로 닫기">✕</button>
        </div>
      </header>

      <div id="body">
        <aside id="sidebar">
          <div id="sidebar-grip" class="sidebar-grip" title="드래그해서 이동">⠿ 도구막대</div>
          <nav id="room-tabs" class="room-tabs" aria-label="방 이동"></nav>
          <button id="btn-add" class="btn btn--primary">＋ 이미지</button>
          <button id="btn-add-text" class="btn">＋ 문장</button>
          <div class="sidebar__group">
            <button id="btn-edit" class="btn" data-needs-selection disabled>편집</button>
            <button id="btn-front" class="btn" data-needs-selection disabled>앞으로</button>
            <button id="btn-back" class="btn" data-needs-selection disabled>뒤로</button>
            <button id="btn-lock" class="btn" data-needs-selection disabled>잠금</button>
            <button id="btn-delete" class="btn btn--danger" data-needs-selection disabled>삭제</button>
          </div>

          <div class="sidebar__overlay-controls" id="overlay-controls">
            <button id="btn-to-display" class="btn" title="전시 모드 (Ctrl+Alt+E)">👁 전시 모드</button>
            <button id="btn-exit-overlay" class="btn" title="일반 창으로 (Ctrl+Alt+L)">🗗 창으로</button>
          </div>

          <div class="sidebar__footer">
            <label class="toggle">
              <input type="checkbox" id="autostart-toggle" />
              <span>부팅 시 자동 실행</span>
            </label>
            <button id="btn-update" class="btn btn--ghost">업데이트 확인</button>
          </div>
        </aside>

        <main id="canvas-wrap">
          <div id="stage"></div>
          <div id="empty-hint" class="empty-hint">
            이미지를 끌어다 놓아 거실을 꾸며보세요
          </div>

          <!-- 편집 패널 (단계 5) -->
          <section id="edit-panel" class="edit-panel" hidden>
            <header class="edit-panel__head">
              <strong>편집</strong>
              <button id="edit-close" class="iconbtn" title="닫기">✕</button>
            </header>

            <div class="edit-panel__body" id="edit-filters">
              <label class="slider">
                <span>밝기</span>
                <input type="range" id="f-brightness" min="-1" max="1" step="0.02" value="0" />
              </label>
              <label class="slider">
                <span>채도</span>
                <input type="range" id="f-saturation" min="-1" max="1" step="0.02" value="0" />
              </label>
              <label class="slider">
                <span>색조</span>
                <input type="range" id="f-hue" min="0" max="360" step="1" value="0" />
              </label>
              <label class="slider">
                <span>대비</span>
                <input type="range" id="f-contrast" min="-1" max="1" step="0.02" value="0" />
              </label>
            </div>

            <footer class="edit-panel__foot">
              <button id="btn-crop" class="btn">크롭</button>
              <button id="btn-reset" class="btn">원래대로</button>
            </footer>

            <!-- 크롭 모드 컨트롤 -->
            <div id="crop-controls" class="crop-controls" hidden>
              <span class="crop-controls__hint">자를 영역을 조절하세요</span>
              <button id="crop-apply" class="btn btn--primary">적용</button>
              <button id="crop-cancel" class="btn">취소</button>
            </div>
          </section>

          <!-- 문장 카드 스타일러 (G2) -->
          <section id="text-panel" class="edit-panel text-panel" hidden>
            <header class="edit-panel__head">
              <strong>문장 꾸미기</strong>
              <button id="text-close" class="iconbtn" title="닫기">✕</button>
            </header>
            <textarea
              id="t-text"
              class="t-text"
              rows="4"
              placeholder="문장이나 RP 글을 입력하세요"
            ></textarea>
            <div class="t-row">
              <label class="t-field">폰트
                <select id="t-font"></select>
              </label>
            </div>
            <label class="slider">
              <span>크기</span>
              <input type="range" id="t-size" min="12" max="48" step="1" value="22" />
            </label>
            <div class="t-row">
              <label class="t-field">색
                <input type="color" id="t-color" value="#3a3128" />
              </label>
              <label class="t-field">정렬
                <select id="t-align">
                  <option value="left">왼쪽</option>
                  <option value="center">가운데</option>
                  <option value="right">오른쪽</option>
                </select>
              </label>
            </div>
            <div class="t-row">
              <label class="t-field">배경지
                <select id="t-bg">
                  <option value="none">없음</option>
                  <option value="paper">한지</option>
                  <option value="card">카드</option>
                  <option value="neon">네온</option>
                </select>
              </label>
              <label class="t-field">프레임
                <select id="t-frame">
                  <option value="none">없음</option>
                  <option value="line">선</option>
                  <option value="dashed">점선</option>
                </select>
              </label>
            </div>
          </section>
        </main>
      </div>
    </div>

    <!-- 책 읽기/편집 모달 (서재) -->
    <div id="book-reader" class="book-reader" hidden>
      <div class="book-reader__backdrop" id="reader-backdrop"></div>
      <div class="book-reader__card">
        <header class="book-reader__head">
          <input id="r-title" class="r-title" placeholder="제목" />
          <button id="reader-close" class="iconbtn" title="닫기 (Esc)">✕</button>
        </header>
        <textarea
          id="r-text"
          class="r-text"
          placeholder="여기에 RP 글이나 문장을 적어요"
        ></textarea>
        <footer class="book-reader__foot">
          <div class="r-colors" id="r-colors" aria-label="책등 색"></div>
          <button id="reader-delete" class="btn btn--danger">삭제</button>
        </footer>
      </div>
    </div>

    <!-- 일기장 (서재) -->
    <div id="diary" class="book-reader" hidden>
      <div class="book-reader__backdrop" id="diary-backdrop"></div>
      <div class="book-reader__card diary-card">
        <header class="book-reader__head diary-head">
          <button id="diary-prev" class="iconbtn" title="이전 날">‹</button>
          <div class="diary-date" id="diary-date"></div>
          <button id="diary-next" class="iconbtn" title="다음 날">›</button>
          <button id="diary-close" class="iconbtn" title="닫기 (Esc)">✕</button>
        </header>
        <div class="diary-stamps" id="diary-stamps" aria-label="오늘의 기분 도장"></div>
        <textarea
          id="diary-text"
          class="r-text"
          placeholder="오늘 어땠어? (안 써도 괜찮아)"
        ></textarea>
        <footer class="diary-foot">
          <div class="diary-dots" id="diary-dots" aria-label="기록한 날"></div>
          <button id="diary-today" class="btn">오늘로</button>
        </footer>
      </div>
    </div>

    <input
      type="file"
      id="file-input"
      accept="image/png,image/jpeg,image/webp"
      multiple
      hidden
    />
  </body>
</html>
